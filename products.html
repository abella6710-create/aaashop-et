<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Products - AAA SHOP</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Browse products from AAA SHOP in Ethiopia.">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
}

nav {
  background: #1565c0;
  padding: 12px;
  text-align: center;
}

nav a {
  color: white;
  text-decoration: none;
  margin: 0 10px;
}

header {
  background: linear-gradient(135deg, #1e88e5, #1565c0);
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  padding: 15px;
}

#productList {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 12px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
}

.price {
  color: #1e88e5;
  font-weight: bold;
  font-size: 18px;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="products.html">Products</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
</nav>

<header>
  <h1>AAA SHOP Products</h1>
  <p>Browse all available products</p>
</header>

<div class="container">
  <div id="productList"></div>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

function renderProducts() {
  let box = document.getElementById("productList");

  if(products.length === 0) {
    box.innerHTML = "<p>No products available yet.</p>";
    return;
  }

  box.innerHTML = "";

  products.forEach(p => {
    box.innerHTML += `
    <div class="card">
  <img src="${p.image}">
  <div class="card-content">
        <img src="${p.image}">
        <h3>${p.name}</h3>

        <p class="price">${p.price} Birr</p>

        <p style="
          color:${p.stock === 'In Stock' ? 'green' : 'red'};
          font-weight:bold;
        ">
          ${p.stock}
        </p>
      </div>
    `;
  });
}

renderProducts();
</script>

</body>
</html>
