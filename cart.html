<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AAA SHOP - Cart</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f6f8;
}

header {
  background: #1e88e5;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border: none;
  border-radius: 8px;
  background: #1e88e5;
  color: white;
  font-weight: bold;
}

.remove {
  background: red;
}

.total {
  font-size: 18px;
  font-weight: bold;
  margin-top: 15px;
}

.back {
  background: #444;
}
</style>
</head>

<body>

<header>🛒 Your Cart</header>

<div class="container">

<div id="cartList"></div>

<div class="total" id="total"></div>

<button onclick="checkout()">Checkout</button>

<button class="back" onclick="location.href='index.html'">⬅ Back to Shop</button>

</div>

<script>

/* GET CART FROM INDEX */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* RENDER CART */
function renderCart(){
  let box = document.getElementById("cartList");
  let total = 0;

  box.innerHTML = "";

  if(cart.length === 0){
    box.innerHTML = "<p>Your cart is empty</p>";
    document.getElementById("total").innerText = "";
    return;
  }

  cart.forEach((item, i)=>{
    total += Number(item.price);

    box.innerHTML += `
      <div class="card">
        <h3>${item.name}</h3>
        <p>${item.price} Birr</p>
        <button class="remove" onclick="removeItem(${i})">Remove</button>
      </div>
    `;
  });

  document.getElementById("total").innerText =
    "Total: " + total + " Birr";
}

/* REMOVE ITEM */
function removeItem(i){
  cart.splice(i, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

/* CHECKOUT */
function checkout(){
  if(cart.length === 0){
    alert("Cart is empty");
    return;
  }

  alert(
    "Order placed!\n\nPay via:\nTelebirr: 09******\nCBE: 1000*******"
  );

  localStorage.removeItem("cart");
  cart = [];
  renderCart();
}

/* INIT */
renderCart();

</script>

</body>
</html>
