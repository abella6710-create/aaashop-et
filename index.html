<!DOCTYPE html>
<html>
<head>
  <title>AAA SHOP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f8;
    }

    header {
      background: #1e88e5;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 { margin: 0; }

    .container {
      padding: 15px;
    }

    /* Search bar */
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    /* Filter buttons */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
    }

    .filters button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #ddd;
      cursor: pointer;
    }

    .filters button.active {
      background: #1e88e5;
      color: white;
    }

    /* Product cards */
    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .price {
      color: #1e88e5;
      font-weight: bold;
    }

    .available { color: green; }
    .out { color: red; }
  </style>
</head>

<body>

<header>
  <h1>AAA SHOP</h1>
  <p>Search & Filter Products</p>
</header>

<div class="container">

  <!-- Search -->
  <input type="text" id="search" placeholder="Search product..." onkeyup="filterProducts()">

  <!-- Filters -->
  <div class="filters">
    <button onclick="setFilter('all')" class="active">All</button>
    <button onclick="setFilter('available')">Available</button>
    <button onclick="setFilter('out')">Out</button>
  </div>

  <!-- Products -->
  <div id="products">

    <div class="card" data-status="available">
      <h3>Rice</h3>
      <p class="price">100 Birr</p>
      <p class="available">Available</p>
    </div>

    <div class="card" data-status="out">
      <h3>Sugar</h3>
      <p class="price">120 Birr</p>
      <p class="out">Out of Stock</p>
    </div>

    <div class="card" data-status="available">
      <h3>Oil</h3>
      <p class="price">250 Birr</p>
      <p class="available">Available</p>
    </div>

    <div class="card" data-status="available">
      <h3>Bread</h3>
      <p class="price">20 Birr</p>
      <p class="available">Available</p>
    </div>

  </div>

</div>

<script>
let currentFilter = "all";

function setFilter(filter) {
  currentFilter = filter;

  document.querySelectorAll(".filters button").forEach(btn => {
    btn.classList.remove("active");
  });

  event.target.classList.add("active");

  filterProducts();
}

function filterProducts() {
  let search = document.getElementById("search").value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let name = card.querySelector("h3").innerText.toLowerCase();
    let status = card.getAttribute("data-status");

    let matchSearch = name.includes(search);
    let matchFilter =
      currentFilter === "all" ||
      currentFilter === status;

    if (matchSearch && matchFilter) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}
</script>

</body>
</html>
