<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAA SHOP</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f8;}
header{background:#1e88e5;color:white;padding:15px;text-align:center;}

.screen{display:none;padding:15px;}
.active{display:block;}

.card{
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
  background:#1e88e5;
  color:white;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:white;
  border-top:1px solid #ddd;
}

.bottom-nav button{
  flex:1;
  background:none;
  color:#1e88e5;
}

#notify{
  position:fixed;
  top:10px;
  right:10px;
  background:#1e88e5;
  color:white;
  padding:10px;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<header>AAA SHOP</header>

<div id="notify"></div>

<!-- HOME -->
<div id="home" class="screen active">
  <h2>Welcome 👋</h2>

  <input id="username" placeholder="Enter name">
  <button onclick="loginUser()">Enter Shop</button>

  <button onclick="show('login')">Admin Login</button>
</div>

<!-- SHOP (TIKTOK STYLE) -->
<div id="shop" class="screen">
  <h2>Shop 🛍</h2>
  <div id="list"></div>

  <h3>💬 Chat Admin</h3>
  <div id="chatBox"></div>
  <input id="msg" placeholder="Message admin">
  <button onclick="sendMsg()">Send</button>
</div>

<!-- CART -->
<div id="cart" class="screen">
  <h2>Cart 🛒</h2>
  <div id="cartList"></div>
  <h3 id="total"></h3>
  <button onclick="clearCart()">Clear</button>
  <button onclick="checkout()">Checkout</button>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="screen">
  <h2>Checkout 💳</h2>

  <div class="card">
    <h3>Telebirr</h3>
    <p>09******</p>
  </div>

  <div class="card">
    <h3>CBE</h3>
    <p>1000*******</p>
  </div>

  <button onclick="placeOrder()">Confirm Order</button>
</div>

<!-- ADMIN -->
<div id="login" class="screen">
  <h2>Admin Login</h2>
  <input id="pass" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="admin" class="screen">
  <h2>Admin Panel</h2>

  <input id="name" placeholder="Name">
  <input id="price" placeholder="Price">
  <input id="img" type="file">

  <button onclick="add()">Add Product</button>

  <h3>📡 Online Users</h3>
  <div id="usersBox"></div>

  <h3>💬 Messages</h3>
  <div id="adminChat"></div>

  <h3>📦 Orders</h3>
  <div id="ordersBox"></div>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <button onclick="show('home')">🏠</button>
  <button onclick="show('shop')">🛍</button>
  <button onclick="show('cart')">🛒</button>
</div>

<script>

/* DATA */
let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let messages = JSON.parse(localStorage.getItem("messages")) || [];
let orders = JSON.parse(localStorage.getItem("orders")) || [];
let users = JSON.parse(localStorage.getItem("users")) || [];

let currentUser = null;

/* NAV */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if(id==="shop") render();
  if(id==="cart") renderCart();
  if(id==="admin") renderAdminAll();
}

/* USER LOGIN */
function loginUser(){
  let name = document.getElementById("username").value;

  currentUser = {
    id:Date.now(),
    name:name,
    lastActive:Date.now()
  };

  users.push(currentUser);
  localStorage.setItem("users",JSON.stringify(users));

  show("shop");
  render();
  renderChat();
}

/* SHOP TIKTOK STYLE */
function render(){
  let box=document.getElementById("list");
  box.innerHTML="";

  products.forEach((p,i)=>{
    box.innerHTML+=`
      <div class="card" style="text-align:center;">
        <img src="${p.img}" style="width:100%;border-radius:10px;">
        <h2>${p.name}</h2>
        <p>${p.price} Birr</p>

        <button onclick="addToCart(${i})">🛒 Add</button>
      </div>
    `;
  });
}

/* CART */
function addToCart(i){
  let found = cart.find(c=>c.name===products[i].name);

  if(found){
    found.qty++;
  }else{
    cart.push({...products[i],qty:1});
  }

  localStorage.setItem("cart",JSON.stringify(cart));
  notify("Added to cart 🛒");
}

function renderCart(){
  let box=document.getElementById("cartList");
  let totalBox=document.getElementById("total");

  box.innerHTML="";
  let total=0;

  cart.forEach((p,i)=>{
    total+=p.price*p.qty;

    box.innerHTML+=`
      <div class="card">
        <h3>${p.name}</h3>
        <p>${p.price} x ${p.qty}</p>

        <button onclick="addQty(${i})">+</button>
        <button onclick="removeQty(${i})">-</button>
      </div>
    `;
  });

  totalBox.innerText="Total: "+total+" Birr";
}

function addQty(i){cart[i].qty++;saveCart();}
function removeQty(i){cart[i].qty--;if(cart[i].qty<=0)cart.splice(i,1);saveCart();}
function clearCart(){cart=[];saveCart();}

function saveCart(){
  localStorage.setItem("cart",JSON.stringify(cart));
  renderCart();
}

/* CHECKOUT */
function checkout(){
  show("checkout");
}

function placeOrder(){
  orders.push({
    user:currentUser?.name,
    items:cart,
    time:new Date().toLocaleString()
  });

  localStorage.setItem("orders",JSON.stringify(orders));

  cart=[];
  saveCart();

  notify("Order placed ✔");
}

/* ADMIN LOGIN */
function login(){
  let pass=document.getElementById("pass").value;

  if(pass==="admin"){
    show("admin");
    renderAdminAll();
  }else alert("Wrong");
}

/* ADD PRODUCT */
function add(){
  let name=document.getElementById("name").value;
  let price=document.getElementById("price").value;
  let file=document.getElementById("img").files[0];

  let reader=new FileReader();

  reader.onload=function(e){
    products.push({name,price,img:e.target.result});
    localStorage.setItem("products",JSON.stringify(products));
    render();
  };

  reader.readAsDataURL(file);
}

/* CHAT */
function sendMsg(){
  messages.push({
    from:currentUser.name,
    text:document.getElementById("msg").value
  });

  localStorage.setItem("messages",JSON.stringify(messages));
  renderChat();
}

function renderChat(){
  let box=document.getElementById("chatBox");
  box.innerHTML="";

  messages.forEach(m=>{
    box.innerHTML+=`
      <div class="card">
        <b>${m.from}:</b> ${m.text}
      </div>
    `;
  });
}

/* ADMIN PANEL ALL */
function renderAdminAll(){

  /* USERS */
  let u=document.getElementById("usersBox");
  u.innerHTML=users.map(x=>`<div class="card">${x.name}</div>`).join("");

  /* CHAT */
  let c=document.getElementById("adminChat");
  c.innerHTML=messages.map(m=>`
    <div class="card"><b>${m.from}:</b> ${m.text}</div>
  `).join("");

  /* ORDERS */
  let o=document.getElementById("ordersBox");
  o.innerHTML=orders.map(o=>`
    <div class="card">
      <b>${o.user}</b><br>
      ${o.time}
    </div>
  `).join("");
}

/* NOTIFICATION */
function notify(text){
  let n=document.getElementById("notify");
  n.innerText=text;
  n.style.display="block";

  setTimeout(()=>n.style.display="none",1500);
}

/* INIT */
window.onload=()=>show("home");

</script>

</body>
</html>
