<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAA SHOP</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
}

header{
  background:#1e88e5;
  color:white;
  padding:15px;
  text-align:center;
}

.screen{display:none;padding:15px;}
.active{display:block;}

.card{
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
  background:#1e88e5;
  color:white;
}

/* POPUP */
#popup{
  position:fixed;
  bottom:100px;
  left:50%;
  transform:translateX(-50%);
  background:#1e88e5;
  color:white;
  padding:10px 20px;
  border-radius:20px;
  display:none;
}

/* NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:white;
  border-top:1px solid #ddd;
}

.bottom-nav button{
  flex:1;
  background:none;
  color:#1e88e5;
}
</style>
</head>

<body>

<header>AAA SHOP</header>

<!-- HOME -->
<div id="home" class="screen active">
  <h2>Welcome 👋</h2>
  <button onclick="openShop()">Start Shopping</button>
</div>

<!-- SHOP -->
<div id="shop" class="screen">
  <h2>Shop</h2>
  <div id="list"></div>
</div>

<!-- CART -->
<div id="cart" class="screen">
  <h2>🛒 Cart</h2>
  <div id="cartList"></div>
  <h3 id="total"></h3>
  <button onclick="clearCart()">Clear Cart</button>
  <button onclick="show('checkout')">Checkout</button>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="screen">
  <h2>Checkout 💳</h2>

  <div class="card">
    <h3>Telebirr</h3>
    <p>09******</p>
  </div>

  <div class="card">
    <h3>CBE</h3>
    <p>1000*******</p>
  </div>

  <button onclick="alert('Order placed!')">Confirm Order</button>
</div>

<!-- LOGIN -->
<div id="login" class="screen">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="pass" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- POPUP -->
<div id="popup">Added to cart 🛒</div>

<!-- NAV -->
<div class="bottom-nav">
  <button onclick="show('home')">🏠</button>
  <button onclick="openShop()">🛍</button>
  <button onclick="show('cart')">🛒</button>
</div>

<script>

/* DATA */
let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* SCREEN */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if(id==="cart") renderCart();
}

/* SHOP */
function openShop(){
  show("shop");
  render();
}

/* RENDER SHOP */
function render(){
  let box = document.getElementById("list");
  box.innerHTML = "";

  products.forEach((p,i)=>{
    box.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>${p.price} Birr</p>

        <button onclick="addToCart(${i})">Add to Cart</button>
      </div>
    `;
  });
}

/* POPUP */
function popup(){
  let p = document.getElementById("popup");
  p.style.display="block";
  setTimeout(()=>p.style.display="none",1000);
}

/* ADD TO CART (WITH QUANTITY) */
function addToCart(i){

  let found = cart.find(c=>c.name===products[i].name);

  if(found){
    found.qty++;
  }else{
    cart.push({...products[i], qty:1});
  }

  localStorage.setItem("cart", JSON.stringify(cart));

  popup();
}

/* CART RENDER */
function renderCart(){
  let box = document.getElementById("cartList");
  let totalBox = document.getElementById("total");

  box.innerHTML = "";

  let total = 0;

  cart.forEach((p,i)=>{
    total += p.price * p.qty;

    box.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>${p.price} Birr x ${p.qty}</p>

        <button onclick="addQty(${i})">+</button>
        <button onclick="removeQty(${i})">-</button>
        <button onclick="removeItem(${i})">Remove</button>
      </div>
    `;
  });

  totalBox.innerText = "Total: " + total + " Birr";
}

/* QTY + */
function addQty(i){
  cart[i].qty++;
  saveCart();
}

/* QTY - */
function removeQty(i){
  cart[i].qty--;
  if(cart[i].qty<=0) cart.splice(i,1);
  saveCart();
}

/* REMOVE */
function removeItem(i){
  cart.splice(i,1);
  saveCart();
}

/* CLEAR */
function clearCart(){
  cart=[];
  saveCart();
}

/* SAVE */
function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

/* LOGIN SIMPLE */
function login(){
  alert("Login system placeholder");
}

</script>

</body>
</html>
