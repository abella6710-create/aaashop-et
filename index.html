<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAA SHOP</title>

<style>

/* ===== BASIC APP STYLE ===== */
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
}

header{
  background:#1e88e5;
  color:white;
  padding:15px;
  text-align:center;
}

.screen{
  display:none;
  padding:15px;
}

.active{
  display:block;
}

/* ===== CARDS ===== */
.card{
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
  background:#1e88e5;
  color:white;
}

/* ===== BOTTOM NAV ===== */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:white;
  border-top:1px solid #ddd;
}

.bottom-nav button{
  flex:1;
  background:none;
  color:#1e88e5;
}

</style>
</head>

<body>

<header>AAA SHOP ETHIOPIA</header>

<!-- ================= SCREENS ================= -->

<div id="home" class="screen active">
  <h2>Welcome 👋</h2>
  <button onclick="openShop()">Start Shopping</button>
</div>

<div id="shop" class="screen">
  <h2>Shop</h2>
  <div id="list"></div>
</div>

<div id="login" class="screen">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="pass" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="admin" class="screen">
  <h2>Admin Panel</h2>
  <input id="name" placeholder="Name">
  <input id="price" placeholder="Price">
  <input id="cat" placeholder="Category">
  <input id="img" type="file">
  <button onclick="add()">Add Product</button>
</div>

<div id="order" class="screen">
  <h2>Order</h2>
  <p id="orderInfo"></p>
</div>

<!-- ABOUT -->
<div id="about" class="screen">
  <h2>About AAA SHOP</h2>
  <p>AAA SHOP is a modern Ethiopian online store built for fast and simple shopping experience.</p>
</div>

<!-- CONTACT -->
<div id="contact" class="screen">
  <h2>Contact Us</h2>
  <p>Email: aaashop@gmail.com</p>
  <p>Phone: +251 900 000 000</p>
</div>

<!-- ================= NAV ================= -->
<div class="bottom-nav">
  <button onclick="showHome()">🏠</button>
  <button onclick="openShop()">🛍</button>
  <button onclick="showLogin()">👤</button>
  <button onclick="show('about')">ℹ️</button>
  <button onclick="show('contact')">📞</button>
</div>

<!-- ================= SCRIPT ================= -->
<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = JSON.parse(localStorage.getItem("currentUser")) || null;
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let selected = null;

/* SCREEN SWITCH */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function showHome(){ show("home"); }
function openShop(){ show("shop"); render(); }
function showLogin(){ show("login"); }

/* LOGIN */
function login(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  let user = users.find(u=>u.email===email && u.pass===pass);

  if(user){
    currentUser = user;
    localStorage.setItem("currentUser", JSON.stringify(user));
    alert("Welcome " + email);
    showHome();
  } else {
    alert("Wrong login");
  }
}

/* ADD PRODUCT */
function add(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let cat = document.getElementById("cat").value;
  let file = document.getElementById("img").files[0];

  let reader = new FileReader();

  reader.onload = function(e){
    products.push({name,price,cat,img:e.target.result});
    localStorage.setItem("products", JSON.stringify(products));
    alert("Product added");
  }

  reader.readAsDataURL(file);
}

/* CART */
function addToCart(i){
  cart.push(products[i]);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart 🛒");
}

/* BUY */
function buy(i){
  selected = products[i];
  document.getElementById("orderInfo").innerText =
    selected.name + " - " + selected.price;
  show("order");
}

/* RENDER */
function render(){
  let box = document.getElementById("list");
  box.innerHTML = "";

  products.forEach((p,i)=>{
    box.innerHTML += `
      <div class="card">
        <img src="${p.img}" width="100%">
        <h3>${p.name}</h3>
        <p>${p.price} Birr</p>

        <button onclick="addToCart(${i})">Add to Cart</button>
        <button onclick="buy(${i})">Buy</button>
      </div>
    `;
  });
}

window.onload = render;

</script>

</body>
</html>
