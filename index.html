<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AAA SHOP Ethiopia - Online Store</title>

  <meta name="description" content="AAA SHOP Ethiopia is a modern online store where you can buy products easily.">
  <meta name="keywords" content="AAA SHOP, Ethiopia shop, online store Ethiopia">
  <meta name="robots" content="index, follow">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e88e5">

  <!-- ICON -->
  <link rel="icon" href="logo.png">

  <style>

  /* ================= BASE ================= */
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    color: #222;
  }

  /* ================= HEADER ================= */
  header {
    background: linear-gradient(135deg, #1e88e5, #1565c0);
    color: white;
    text-align: center;
    padding: 18px;
  }

  /* ================= INPUTS ================= */
  input {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
  }

  /* ================= BUTTONS ================= */
  button {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 10px;
    border: none;
    background: #1e88e5;
    color: white;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #1565c0;
  }

  /* ================= SCREENS ================= */
  .screen {
    display: none;
    opacity: 0;
    transform: translateY(10px);
    transition: 0.3s ease;
  }

  .screen.active {
    display: block;
    opacity: 1;
    transform: translateY(0);
  }

  /* ================= CARD ================= */
  .card {
    background: white;
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
  }

  .price {
    color: #1e88e5;
    font-weight: bold;
  }

  /* ================= BOTTOM NAV ================= */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
    box-shadow: 0 -3px 12px rgba(0,0,0,0.1);
  }

  .bottom-nav button {
    background: none;
    color: #666;
    width: auto;
    font-size: 14px;
  }

  </style>
</head>

<body>

<!-- ================= HEADER ================= -->
<header>AAA SHOP</header>

<!-- ================= SCREENS ================= -->
<div id="roleScreen" class="screen active">
  <h2>Welcome</h2>
  <button onclick="openCustomer()">🛒 Customer</button>
  <button onclick="showAdminLogin()">🔐 Admin</button>
</div>

<div id="adminLogin" class="screen">
  <h3>Admin Login</h3>
  <input id="code" type="password" placeholder="Enter Code">
  <button onclick="loginAdmin()">Login</button>
</div>

<div id="adminDashboard" class="screen">
  <h3>Admin Panel</h3>
  <input id="name" placeholder="Product Name">
  <input id="price" placeholder="Price">
  <input id="image" type="file">
  <button onclick="addProduct()">Add Product</button>
  <div id="adminList"></div>
</div>

<div id="shop" class="screen">
  <h3>Shop</h3>
  <div id="shopList"></div>
</div>

<!-- ================= BOTTOM NAV ================= -->
<div class="bottom-nav">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="openCustomer()">🛍 Shop</button>
  <button onclick="showAdminLogin()">⚙ Admin</button>
</div>

<!-- ================= SCRIPT ================= -->
<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
const admins = ["admin123", "aaa2026"];

/* NAV */
function show(id) {
  document.querySelectorAll(".screen").forEach(s => {
    s.classList.remove("active");
    s.style.display = "none";
  });

  let el = document.getElementById(id);
  el.style.display = "block";
  setTimeout(() => el.classList.add("active"), 50);
}

function goHome() {
  show("roleScreen");
}

function openCustomer() {
  show("shop");
  renderShop();
}

function showAdminLogin() {
  show("adminLogin");
}

/* LOGIN */
function loginAdmin() {
  let code = document.getElementById("code").value;
  if (admins.includes(code)) {
    show("adminDashboard");
    renderAdmin();
  } else {
    alert("Wrong code");
  }
}

/* ADD PRODUCT */
function addProduct() {
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let file = document.getElementById("image").files[0];

  let reader = new FileReader();
  reader.onload = function(e) {
    products.push({ name, price, image: e.target.result });
    localStorage.setItem("products", JSON.stringify(products));
    renderShop();
    renderAdmin();
  };
  reader.readAsDataURL(file);
}

/* RENDER */
function renderShop() {
  let box = document.getElementById("shopList");
  box.innerHTML = "";
  products.forEach(p => {
    box.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p class="price">${p.price} Birr</p>
      </div>
    `;
  });
}

function renderAdmin() {
  let box = document.getElementById("adminList");
  box.innerHTML = "";
  products.forEach(p => {
    box.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>${p.price}</p>
      </div>
    `;
  });
}

/* INIT */
window.onload = function () {
  show("roleScreen");
};

/* SERVICE WORKER */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
