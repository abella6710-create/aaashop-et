<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AAA SHOP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ================= SPLASH ================= */
.splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #1e88e5, #1565c0);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  color: white;
  animation: fadeOut 0.5s ease 3s forwards;
}

.logo {
  font-size: 32px;
  font-weight: bold;
  animation: zoomIn 1s ease;
}

.loader {
  margin-top: 20px;
  width: 40px;
  height: 40px;
  border: 4px solid rgba(255,255,255,0.3);
  border-top: 4px solid white;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

@keyframes zoomIn {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* ================= BASE ================= */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef3f8;
}

/* ================= HEADER ================= */
header {
  background: linear-gradient(135deg, #1e88e5, #1565c0);
  color: white;
  text-align: center;
  padding: 16px;
}

/* ================= SCREEN SYSTEM ================= */
.screen {
  display: none;
  opacity: 0;
  transform: translateY(10px);
  transition: 0.3s ease;
  padding: 15px;
}

.screen.active {
  display: block;
  opacity: 1;
  transform: translateY(0);
}

/* ================= CARD ================= */
.card {
  background: white;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
}

.price {
  color: #1e88e5;
  font-weight: bold;
}

/* ================= BUTTONS ================= */
button {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: none;
  background: #1e88e5;
  color: white;
  font-weight: bold;
}

/* ================= INPUT ================= */
input {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: 1px solid #ccc;
}

</style>
</head>

<body>

<!-- ================= SPLASH ================= -->
<div id="splash" class="splash">
  <div class="logo">AAA SHOP</div>
  <div class="loader"></div>
</div>

<header>AAA SHOP</header>

<div id="roleScreen" class="screen active">
  <h2>Welcome</h2>
  <button onclick="openCustomer()">🛒 Customer</button>
  <button onclick="showAdminLogin()">🔐 Admin</button>
</div>

<div id="adminLogin" class="screen">
  <h3>Admin Login</h3>
  <input id="email" placeholder="Email">
  <input id="code" type="password" placeholder="Code">
  <button onclick="loginAdmin()">Login</button>
</div>

<div id="adminDashboard" class="screen">
  <h3>Admin Panel</h3>

  <input id="name" placeholder="Name">
  <input id="price" placeholder="Price">
  <input id="image" type="file">

  <button onclick="addProduct()">Add</button>

  <div id="adminList"></div>
</div>

<div id="shop" class="screen">
  <h3>Shop</h3>
  <div id="shopList"></div>
</div>

<script>

/* ================= DATA ================= */
let products = JSON.parse(localStorage.getItem("products")) || [];
const admins = ["admin123", "aaa2026"];
let isAdmin = false;

/* ================= SPLASH ================= */
window.onload = function () {
  setTimeout(() => {
    document.getElementById("splash").style.display = "none";
    show("roleScreen");
  }, 3000);
};

/* ================= NAV ================= */
function show(id) {
  document.querySelectorAll(".screen").forEach(s => {
    s.classList.remove("active");
    s.style.display = "none";
  });

  let el = document.getElementById(id);
  if (el) {
    el.style.display = "block";
    setTimeout(() => el.classList.add("active"), 10);
  }
}

/* ================= MODE ================= */
function openCustomer() {
  show("shop");
  renderShop();
}

function showAdminLogin() {
  show("adminLogin");
}

/* ================= LOGIN ================= */
function loginAdmin() {
  let code = document.getElementById("code").value;

  if (admins.includes(code)) {
    isAdmin = true;
    show("adminDashboard");
    renderAdmin();
  } else {
    alert("Wrong code");
  }
}

/* ================= ADD ================= */
function addProduct() {
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let file = document.getElementById("image").files[0];

  let reader = new FileReader();

  reader.onload = function(e) {
    products.push({ name, price, image: e.target.result });
    save();
    renderAdmin();
    renderShop();
  };

  reader.readAsDataURL(file);
}

/* ================= RENDER ================= */
function renderShop() {
  let box = document.getElementById("shopList");
  box.innerHTML = "";

  products.forEach(p => {
    box.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p class="price">${p.price} Birr</p>
      </div>
    `;
  });
}

function renderAdmin() {
  let box = document.getElementById("adminList");
  box.innerHTML = "";

  products.forEach(p => {
    box.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p class="price">${p.price}</p>
      </div>
    `;
  });
}

/* ================= SAVE ================= */
function save() {
  localStorage.setItem("products", JSON.stringify(products));
}

</script>

</body>
</html>
