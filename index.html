<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AAA SHOP Ethiopia</title>

<meta name="theme-color" content="#1e88e5">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="logo.png">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
  color:#222;
}

header{
  background:#1e88e5;
  color:white;
  padding:15px;
  text-align:center;
}

.screen{
  display:none;
  padding:15px;
}

.screen.active{
  display:block;
}

button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#1e88e5;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#1565c0;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

.card{
  background:white;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
}

.price{
  color:#1e88e5;
  font-weight:bold;
}

/* bottom nav */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:white;
  box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}

.bottom-nav button{
  width:33%;
  background:none;
  color:#555;
  font-size:14px;
}
</style>
</head>

<body>

<header>AAA SHOP</header>

<!-- SCREENS -->
<div id="home" class="screen active">
  <h2>Welcome</h2>
  <button onclick="openShop()">🛍 Shop</button>
  <button onclick="openAdmin()">⚙ Admin</button>
</div>

<div id="shop" class="screen">
  <h2>Shop</h2>
  <div id="shopList"></div>
</div>

<div id="adminLogin" class="screen">
  <h2>Admin Login</h2>
  <input id="adminCode" type="password" placeholder="Enter code">
  <button onclick="login()">Login</button>
</div>

<div id="adminPanel" class="screen">
  <h2>Admin Panel</h2>

  <input id="name" placeholder="Product Name">
  <input id="price" placeholder="Price">
  <input id="image" type="file">

  <button onclick="addProduct()">Add Product</button>

  <div id="adminList"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button onclick="goHome()">Home</button>
  <button onclick="openShop()">Shop</button>
  <button onclick="openAdmin()">Admin</button>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
const adminCode = "admin123";

/* NAV */
function show(id){
  let screens = document.querySelectorAll(".screen");

  screens.forEach(s=>{
    s.classList.remove("active");
  });

  let el = document.getElementById(id);
  if(el){
    el.classList.add("active");
  }
}

function goHome(){ show("home"); }
function openShop(){ show("shop"); renderShop(); }
function openAdmin(){ show("adminLogin"); }

/* LOGIN */
function login(){
  let code = document.getElementById("adminCode").value;

  if(code === adminCode){
    show("adminPanel");
    renderAdmin();
  } else {
    alert("Wrong code");
  }
}

/* ADD PRODUCT */
function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let file = document.getElementById("image").files[0];

  if(!name || !price || !file){
    alert("Fill all fields");
    return;
  }

  let reader = new FileReader();

  reader.onload = function(e){
    products.push({
      name:name,
      price:price,
      image:e.target.result
    });

    localStorage.setItem("products", JSON.stringify(products));

    renderShop();
    renderAdmin();
  };

  reader.readAsDataURL(file);
}

/* SHOP */
function renderShop(){
  let box = document.getElementById("shopList");
  if(!box) return;

  box.innerHTML = "";

  products.forEach(p=>{
    box.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p class="price">${p.price} Birr</p>
      </div>
    `;
  });
}

/* ADMIN */
function renderAdmin(){
  let box = document.getElementById("adminList");
  if(!box) return;

  box.innerHTML = "";

  products.forEach((p,i)=>{
    box.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>${p.price}</p>
        <button onclick="deleteProduct(${i})">Delete</button>
      </div>
    `;
  });
}

/* DELETE */
function deleteProduct(i){
  products.splice(i,1);
  localStorage.setItem("products", JSON.stringify(products));
  renderShop();
  renderAdmin();
}

/* INIT */
window.onload = function(){
  show("home");
  renderShop();
};

/* SERVICE WORKER */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js")
  .catch(err => console.log("SW error:", err));
}

/* PWA INSTALL */
let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  deferredPrompt = e;
  showInstall();
});

function showInstall(){
  let btn = document.createElement("button");

  btn.innerText = "📲 Install AAA SHOP";

  Object.assign(btn.style,{
    position:"fixed",
    bottom:"80px",
    right:"15px",
    background:"#1e88e5",
    color:"white",
    border:"none",
    padding:"12px",
    borderRadius:"10px",
    zIndex:"9999"
  });

  document.body.appendChild(btn);

  btn.onclick = async function(){
    btn.remove();

    if(deferredPrompt){
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
    }
  };
}

</script>

</body>
</html>
