<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

const admins = ["admin123", "aaa2026", "shopowner"];

let isAdmin = false;

// PAGE SWITCH
function show(section) {
  document.getElementById("rolePage").style.display = "none";
  document.getElementById("adminLogin").style.display = "none";
  document.getElementById("adminPage").style.display = "none";
  document.getElementById("shopPage").style.display = "none";

  document.getElementById(section).style.display = "block";
}

// CUSTOMER
function openCustomer() {
  show("shopPage");
  render();
}

// ADMIN LOGIN PAGE
function showAdminLogin() {
  show("adminLogin");
}

// BACK
function back() {
  show("rolePage");
}

// LOGIN ADMIN
function loginAdmin() {
  let email = document.getElementById("adminEmail").value;
  let code = document.getElementById("adminCode").value;

  if (admins.includes(code)) {
    isAdmin = true;
    alert("Welcome Admin: " + email);
    show("adminPage");
    render();
  } else {
    alert("Wrong admin code!");
  }
}

// ADD PRODUCT
function addProduct() {
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let file = document.getElementById("image").files[0];

  if (!name  !price  !file) {
    alert("Fill all fields");
    return;
  }

  let reader = new FileReader();

  reader.onload = function(e) {
    products.push({
      name,
      price,
      image: e.target.result
    });

    localStorage.setItem("products", JSON.stringify(products));
    render();
    alert("Product added!");
  };

  reader.readAsDataURL(file);
}

// 🗑️ DELETE PRODUCT
function deleteProduct(index) {
  if (!confirm("Delete this product?")) return;

  products.splice(index, 1);
  localStorage.setItem("products", JSON.stringify(products));
  render();
}

// ✏️ EDIT PRODUCT
function editProduct(index) {
  let p = products[index];

  let newName = prompt("Edit name:", p.name);
  let newPrice = prompt("Edit price:", p.price);

  if (newName && newPrice) {
    products[index].name = newName;
    products[index].price = newPrice;

    localStorage.setItem("products", JSON.stringify(products));
    render();
  }
}

// RENDER PRODUCTS
function render() {
  let box = document.getElementById("products");
  box.innerHTML = "";

  products.forEach((p, index) => {
    box.innerHTML += 
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p class="price">${p.price} Birr</p>

        ${isAdmin ? 
          <button onclick="editProduct(${index})">✏️ Edit</button>
          <button onclick="deleteProduct(${index})" style="background:red;">🗑️ Delete</button>
         : ""}
      </div>
    ;
  });
}

// LOGOUT
function logout() {
  location.reload();
}

// INIT
render();
          </script>
