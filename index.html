<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AAA SHOP Ethiopia</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e88e5">

<style>
body { margin:0; font-family:Arial; background:#f4f6f8; }

header {
  background:#1e88e5;
  color:white;
  text-align:center;
  padding:15px;
}

/* NAV */
.nav {
  display:flex;
  gap:5px;
  padding:10px;
}

input, select, button {
  padding:10px;
  margin:5px 0;
  width:100%;
  border-radius:8px;
  border:none;
}

button {
  background:#1e88e5;
  color:white;
  font-weight:bold;
}

/* SCREEN */
.screen { display:none; padding:10px; }
.active { display:block; }

/* CARD */
.card {
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

.card img {
  width:100%;
  border-radius:10px;
}

.deleteBtn {
  background:red;
  margin-top:5px;
}

/* TOP BAR */
.topbar {
  display:flex;
  gap:5px;
}
</style>
</head>

<body>

<header>AAA SHOP</header>

<!-- ================= LOGIN ================= -->
<div id="login" class="screen active">
  <h3>Admin Login</h3>
  <input id="pass" type="password" placeholder="Enter password">
  <button onclick="login()">Login</button>
</div>

<!-- ================= SHOP ================= -->
<div id="shop" class="screen">

  <!-- SEARCH + CATEGORY -->
  <input id="search" onkeyup="render()" placeholder="Search products...">

  <select id="category" onchange="render()">
    <option value="all">All</option>
    <option value="food">Food</option>
    <option value="phone">Phones</option>
    <option value="tv">TV</option>
  </select>

  <div id="list"></div>
</div>

<!-- ================= ADMIN ================= -->
<div id="admin" class="screen">

  <h3>Add Product</h3>

  <input id="name" placeholder="Name">
  <input id="price" placeholder="Price">

  <select id="cat">
    <option value="food">Food</option>
    <option value="phone">Phone</option>
    <option value="tv">TV</option>
  </select>

  <input id="img" type="file">

  <button onclick="add()">Add</button>

  <div id="adminList"></div>
</div>

<!-- ================= ORDER ================= -->
<div id="order" class="screen">
  <h3>Order Checkout</h3>

  <p id="orderInfo"></p>

  <h4>Choose Payment</h4>

  <button>Telebirr (09******)</button>
  <button>CBE (1000*******)</button>

  <button onclick="back()">Back</button>
</div>

<script>
let products = JSON.parse(localStorage.getItem("p")) || [];
let isAdmin = false;
let selectedProduct = null;

/* LOGIN */
function login(){
  let pass = document.getElementById("pass").value;
  if(pass === "aaa2026"){
    isAdmin = true;
    show("shop");
    render();
  } else {
    alert("Wrong password");
  }
}

/* NAV */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ADD PRODUCT */
function add(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let cat = document.getElementById("cat").value;
  let file = document.getElementById("img").files[0];

  let reader = new FileReader();
  reader.onload = e=>{
    products.push({name,price,cat,img:e.target.result});
    localStorage.setItem("p", JSON.stringify(products));
    render();
  }
  reader.readAsDataURL(file);
}

/* DELETE */
function del(i){
  products.splice(i,1);
  localStorage.setItem("p", JSON.stringify(products));
  render();
}

/* SEARCH + CATEGORY */
function render(){
  let box = document.getElementById("list");
  let search = document.getElementById("search")?.value || "";
  let cat = document.getElementById("category")?.value || "all";

  box.innerHTML = "";

  products.forEach((p,i)=>{
    if(
      (cat==="all" || p.cat===cat) &&
      p.name.toLowerCase().includes(search.toLowerCase())
    ){
      box.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>${p.price} Birr</p>

        <button onclick="buy(${i})">Buy</button>

        ${isAdmin ? `<button class="deleteBtn" onclick="del(${i})">Delete</button>` : ""}
      </div>`;
    }
  });

  renderAdmin();
}

/* ADMIN LIST */
function renderAdmin(){
  let box = document.getElementById("adminList");
  if(!box) return;

  box.innerHTML = products.map((p,i)=>`
    <div class="card">
      <h3>${p.name}</h3>
      <button onclick="del(${i})">Delete</button>
    </div>
  `).join("");
}

/* BUY */
function buy(i){
  selectedProduct = products[i];
  document.getElementById("orderInfo").innerText =
    selectedProduct.name + " - " + selectedProduct.price + " Birr";

  show("order");
}

/* BACK */
function back(){
  show("shop");
}

render();
</script>

</body>
</html>
