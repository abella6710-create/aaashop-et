<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AAA SHOP Ethiopia</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
}

header {
  background:#1e88e5;
  color:white;
  text-align:center;
  padding:15px;
}

.screen { display:none; padding:15px; }
.active { display:block; }

input, select, button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}

button {
  background:#1e88e5;
  color:white;
  font-weight:bold;
}

.card {
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

.card img {
  width:100%;
  border-radius:10px;
}

.delete {
  background:red;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:white;
}
.nav button {
  width:33%;
  background:none;
  color:#333;
}
</style>
</head>

<body>

<header>AAA SHOP</header>

<!-- HOME -->
<div id="home" class="screen active">
  <h2>Welcome</h2>
  <button onclick="openShop()">🛍 Customer</button>
  <button onclick="showLogin()">⚙ Admin</button>
</div>

<!-- LOGIN -->
<div id="login" class="screen">
  <h3>Admin Login</h3>
  <input id="pass" type="password" placeholder="Enter password">
  <button onclick="login()">Login</button>
  <button onclick="showHome()">Back</button>
</div>

<!-- SHOP -->
<div id="shop" class="screen">

  <input id="search" onkeyup="render()" placeholder="Search products">

  <select id="category" onchange="render()">
    <option value="all">All</option>
    <option value="food">Food</option>
    <option value="phone">Phone</option>
    <option value="tv">TV</option>
  </select>

  <div id="list"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="screen">

  <h3>Add Product</h3>

  <input id="name" placeholder="Name">
  <input id="price" placeholder="Price">

  <select id="cat">
    <option value="food">Food</option>
    <option value="phone">Phone</option>
    <option value="tv">TV</option>
  </select>

  <input id="img" type="file">

  <button onclick="add()">Add</button>

  <div id="adminList"></div>
</div>

<!-- ORDER -->
<div id="order" class="screen">
  <h3>Order</h3>

  <p id="orderInfo"></p>

  <button>Telebirr (09******)</button>
  <button>CBE (1000*******)</button>

  <button onclick="openShop()">Back</button>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="showHome()">Home</button>
  <button onclick="openShop()">Shop</button>
  <button onclick="showLogin()">Admin</button>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let isAdmin = false;
let selected = null;
let cart = JSON.parse(localStorage.getItem("cart")) || [];
/* NAV SYSTEM */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function showHome(){ show("home"); }

function openShop(){
  show("shop");
  render();
}

function showLogin(){
  show("login");
}

/* LOGIN */
function login(){
  let pass = document.getElementById("pass").value;

  if(pass === "aaa2026"){
    isAdmin = true;
    show("admin");
    render();
  } else {
    alert("Wrong password");
  }
}

/* ADD PRODUCT */
function add(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let cat = document.getElementById("cat").value;
  let file = document.getElementById("img").files[0];

  let reader = new FileReader();

  reader.onload = function(e){
    products.push({name,price,cat,img:e.target.result});
    localStorage.setItem("products", JSON.stringify(products));
    render();
  }

  reader.readAsDataURL(file);
}

/* DELETE */
function del(i){
  products.splice(i,1);
  localStorage.setItem("products", JSON.stringify(products));
  render();
}

/* BUY */
function buy(i){
  selected = products[i];
  document.getElementById("orderInfo").innerText =
    selected.name + " - " + selected.price + " Birr";

  show("order");
}
function addToCart(i){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push(products[i]);

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("Added to cart 🛒");
}
/* RENDER */
function render(){
  let box = document.getElementById("list");
  let search = document.getElementById("search")?.value || "";
  let cat = document.getElementById("category")?.value || "all";

  box.innerHTML = "";

  products.forEach((p,i)=>{
    if((cat==="all" || p.cat===cat) &&
      p.name.toLowerCase().includes(search.toLowerCase())){

      box.innerHTML += `
        <div class="card">
          <img src="${p.img}">
          <h3>${p.name}</h3>
          <p>${p.price} Birr</p>

          <button onclick="buy(${i})">Buy</button>

          ${isAdmin ? `<button class="delete" onclick="del(${i})">Delete</button>` : ""}
        </div>
      `;
    }
  });

  renderAdmin();
}

/* ADMIN LIST */
function renderAdmin(){
  let box = document.getElementById("adminList");
  if(!box) return;

  box.innerHTML = products.map((p,i)=>`
    <div class="card">
      <h3>${p.name}</h3>
      <button class="delete" onclick="del(${i})">Delete</button>
    </div>
  `).join("");
}

/* START */
window.onload = ()=>render();

</script>
<button onclick="location.href='cart.html'">🛒 Cart</button>
</body>
</html>
